# Post-installation tasks:
# 1. Inject StartupWMClass into the system .desktop file for correct icon association
# 2. Remove conflicting boost.desktop files from users' .local directories (cleanup AppImage artifacts)
# 3. Update the desktop database to apply changes immediately
postinstall_scripts:
  - echo "Setting up BOOST..."
  - sudo sed -i '/^\[Desktop Entry\]/a StartupWMClass=top.moneyfly.app' "/usr/share/applications/boost.desktop"
  - echo "Search and remove boost.desktop from .local"
  - for user_dir in /home/*; do if [ -f "$user_dir/.local/share/applications/boost.desktop" ]; then rm -f "$user_dir/.local/share/applications/boost.desktop"; echo "Found and removed boost.desktop from $user_dir .local"; fi; done
  - update-desktop-database /usr/share/applications
  - echo "BOOST is ready to use :)"

# Post-uninstallation tasks:
# 1. Iterate through all user directories to remove BOOST configuration and data
# 2. Clean up root user data to ensure a clean removal
postuninstall_scripts:
  - echo "Removing BOOST user data..."
  - for user_dir in /home/*; do if [ -d "$user_dir/.local/share/boost" ]; then rm -rf "$user_dir/.local/share/boost"; echo "Removed data from $user_dir"; fi; done
  - rm -rf /root/.local/share/boost
  - echo "BOOST data cleanup complete."

